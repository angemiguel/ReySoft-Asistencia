services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reysoft_asistencia
      POSTGRES_USER: reysoft_asistencia
      POSTGRES_PASSWORD: reysoft_asistencia
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reysoft_asistencia -d reysoft_asistencia"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://reysoft_asistencia:reysoft_asistencia@postgres:5432/reysoft_asistencia
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - backend-uploads:/app/uploads
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres-data:
  backend-uploads:
